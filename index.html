<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super To-Do List</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>✨ Super To-Do List ✨</h1>

    <div class="input-section">
        <input type="text" id="task-input" placeholder="Add a new task...">
        <input type="date" id="due-date">
        <select id="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
        <button id="add-btn">Add</button>
    </div>

    <div class="filters">
        <button id="all-btn" class="active">All</button>
        <button id="completed-btn">Completed</button>
        <button id="pending-btn">Pending</button>
        <button id="high-btn">High</button>
        <button id="medium-btn">Medium</button>
        <button id="low-btn">Low</button>
    </div>

    <ul id="task-list"></ul>

    <button id="clear-btn">Clear All</button>
</div>

<script src="script.js"></script>
</body>
</html>
